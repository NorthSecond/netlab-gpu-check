global:
  scrape_interval: 20s
  evaluation_interval: 20s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - '/etc/prometheus/alerts/*.yml'

scrape_configs:
  - job_name: 'gpu-nodes'
    file_sd_configs:
      - files:
          - '/etc/prometheus/targets.json'
        refresh_interval: 1m
