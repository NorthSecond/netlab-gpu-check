apiVersion: 1
contactPoints:
  - orgId: 1
    name: gpu-webhook
    receivers:
      - uid: gpu-webhook-receiver
        type: webhook
        settings:
          # Webhook URL 通过 .env 中的 WEBHOOK_URL 环境变量传入，避免敏感信息入 git
          url: '${WEBHOOK_URL}'
          httpMethod: POST
          # 发送告警恢复通知
          disableResolveMessage: false
